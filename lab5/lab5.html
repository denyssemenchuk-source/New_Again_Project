<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4 - Subscription Plan</title>
    <link rel="stylesheet" href="src/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f9f9f9] p-4 md:p-8 text-gray-800">

<div class="max-w-5xl mx-auto">

    <div class="flex justify-between items-center mb-4 px-1">
        <div class="text-sm text-gray-500">
            0 selected
        </div>
        <div class="flex space-x-6 text-sm font-medium text-gray-600">
            <button class="flex items-center hover:text-gray-900 transition-colors">
                <i class="fa-solid fa-staggered mr-2 text-gray-400"></i> Sort by
            </button>
            <button class="flex items-center hover:text-gray-900 transition-colors">
                <i class="fa-solid fa-ellipsis-vertical mr-2 text-gray-400"></i> Actions
            </button>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                <tr class="bg-[#fafafa] border-b border-gray-200 text-sm text-gray-500">
                    <th class="p-4 w-16 text-center">
                        <div class="flex items-center justify-center space-x-1 cursor-pointer">
                            <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                            <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
                        </div>
                    </th>
                    <th class="p-4 font-medium">Name</th>
                    <th class="p-4 font-medium text-center">Properties</th>
                    <th class="p-4 font-medium text-center">Created by</th>
                    <th class="p-4 font-medium">Last updated</th>
                    <th class="p-4 w-12"></th>
                </tr>
                </thead>

                <tbody class="text-sm text-gray-600">
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                    <td class="p-4 text-center">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    </td>
                    <td class="p-4 font-medium text-gray-800">denver</td>
                    <td class="p-4 text-center">24</td>
                    <td class="p-4 text-center">Me</td>
                    <td class="p-4 text-gray-500">02/27/2026 at 1:41PM</td>
                    <td class="p-4 text-center">
                        <button class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </td>
                </tr>

                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                    <td class="p-4 text-center">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    </td>
                    <td class="p-4 font-medium text-gray-800">test save</td>
                    <td class="p-4 text-center">10</td>
                    <td class="p-4 text-center">Me</td>
                    <td class="p-4 text-gray-500">02/10/2026 at 5:52PM</td>
                    <td class="p-4 text-center">
                        <button class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </td>
                </tr>

                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                    <td class="p-4 text-center">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    </td>
                    <td class="p-4 font-medium text-gray-800">gggg</td>
                    <td class="p-4 text-center">10</td>
                    <td class="p-4 text-center">Me</td>
                    <td class="p-4 text-gray-500">02/04/2026 at 5:49PM</td>
                    <td class="p-4 text-center">
                        <button class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </td>
                </tr>

                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                    <td class="p-4 text-center">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    </td>
                    <td class="p-4 font-medium text-gray-800">test full export</td>
                    <td class="p-4 text-center">4059</td>
                    <td class="p-4 text-center">Me</td>
                    <td class="p-4 text-gray-500">02/02/2026 at 11:19AM</td>
                    <td class="p-4 text-center">
                        <button class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </td>
                </tr>

                <tr class="hover:bg-gray-50 transition-colors group">
                    <td class="p-4 text-center">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    </td>
                    <td class="p-4 font-medium text-gray-800">denver 1</td>
                    <td class="p-4 text-center">14</td>
                    <td class="p-4 text-center">Me</td>
                    <td class="p-4 text-gray-500">01/23/2026 at 9:20AM</td>
                    <td class="p-4 text-center">
                        <button class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center p-4 border-t border-gray-200 text-sm text-gray-500">
            <div class="flex items-center">
                Show
                <div class="mx-2 px-3 py-1.5 border border-gray-200 rounded text-gray-700 font-medium bg-white">5</div>
                of 5 results
            </div>
            <div>
                <button class="w-8 h-8 rounded-full border border-[#22c55e] text-[#22c55e] flex items-center justify-center font-medium hover:bg-green-50 transition-colors">
                    1
                </button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
